services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: cpe-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cpe
    ports:
      - '5432:5432'
    volumes:
      - cpe_pgdata:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d cpe']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: cpe-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - cpe_redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  cpe_pgdata:
  cpe_redisdata:
