# Render blueprint for the Context Pack Engine worker.
# The Next.js web app deploys to Vercel; the long-running worker lives here.
# See PRODUCTION.md and setup.md §8 for the full deployment guide.
services:
  - type: worker
    name: cpe-worker
    runtime: node
    plan: starter
    buildCommand: npm ci && npm run db:generate -w @cpe/db && npm run build -w @cpe/worker
    preDeployCommand: npm run db:migrate:deploy -w @cpe/db
    startCommand: npm run start -w @cpe/worker
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: SLACK_BOT_TOKEN
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: EMBEDDINGS_PROVIDER
        value: openai
      - key: APP_BASE_URL
        sync: false
      - key: WORKER_CONCURRENCY
        value: '4'
