# Render blueprint for the Context Pack Engine worker.
# Slack Request URLs go to Vercel only — see docs/DEPLOY-SLACK-VERCEL-RENDER.md
# The Next.js web app deploys to Vercel; the long-running worker lives here.
services:
  - type: worker
    name: cpe-worker
    runtime: node
    plan: starter
    region: oregon
    branch: main
    buildCommand: npm ci && npm run db:generate -w @cpe/db && npm run build -w @cpe/worker
    preDeployCommand: npm run db:migrate:deploy -w @cpe/db
    startCommand: npm run start -w @cpe/worker
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_BASE_URL
        sync: false
        # Set to https://creator.tmi.production (Vercel custom domain)
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: SLACK_BOT_TOKEN
        sync: false
      - key: SLACK_USER_TOKEN
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OLLAMA_ENABLED
        value: 'true'
      - key: OLLAMA_BASE_URL
        sync: false
      - key: OLLAMA_CHAT_MODEL
        value: llama3.2
      - key: OLLAMA_EMBED_MODEL
        value: nomic-embed-text
      - key: EMBEDDINGS_PROVIDER
        value: ollama
      - key: WORKER_CONCURRENCY
        value: '4'
